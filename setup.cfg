[flake8]
max-line-length = 120
max-complexity = 15
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    env,
    .env,
    migrations,
    build,
    dist,
    docs,
    *.egg-info,
    .tox,
    .pytest_cache,
    .mypy_cache,
    node_modules,
    static,
    media,
    tests/*/__pycache__
    *alembic/*
